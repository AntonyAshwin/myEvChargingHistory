<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ashwin's EV History</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
</head>
<body>

<h1>Ashwin's ev charging history</h1>
<p>40 kWh &bull; <span id="period-badge"></span> &bull; <em>Viewer</em></p>

<style>
  @media (min-width: 900px) {
    #mobile-tabs { display: none; }
    #mobile-sections { display: none; }
    #desktop-layout { display: table !important; }
  }
  @media (max-width: 899px) {
    #desktop-layout { display: none !important; }
  }
</style>

<hr>

<!-- MOBILE TABS -->
<div id="mobile-tabs">
  <p>
    <a href="#" onclick="showTab('overview');return false;">[Overview]</a> |
    <a href="#" onclick="showTab('sessions');return false;">[Sessions]</a> |
    <a href="#" onclick="showTab('analytics');return false;">[Analytics]</a>
  </p>
  <hr>
</div>

<!-- DESKTOP: 3-column table -->
<table id="desktop-layout" border="1" cellpadding="10" cellspacing="0" width="100%">
  <tr valign="top">
    <td width="33%">
      <h2>Overview</h2>
      <div id="overview-content"></div>
    </td>
    <td width="33%">
      <h2>Sessions</h2>
      <p>
        <button id="filter-all" onclick="filterSessions('all', this)">All</button>
        <button id="filter-fast" onclick="filterSessions('fast', this)">&#9889; Fast</button>
        <button id="filter-slow" onclick="filterSessions('slow', this)">&#127807; Slow</button>
      </p>
      <div id="sessions-list"></div>
    </td>
    <td width="33%">
      <h2>Analytics</h2>
      <div id="analytics-content"></div>
    </td>
  </tr>
</table>

<!-- MOBILE: tabbed sections (reuse same content divs via JS) -->
<div id="mobile-sections">
  <div id="tab-overview">
    <h2>Overview</h2>
    <div id="overview-content-m"></div>
  </div>
  <div id="tab-sessions" style="display:none">
    <h2>Sessions</h2>
    <p>
      <button id="filter-all-m" onclick="filterSessions('all', this)">All</button>
      <button id="filter-fast-m" onclick="filterSessions('fast', this)">&#9889; Fast</button>
      <button id="filter-slow-m" onclick="filterSessions('slow', this)">&#127807; Slow</button>
    </p>
    <div id="sessions-list-m"></div>
  </div>
  <div id="tab-analytics" style="display:none">
    <h2>Analytics</h2>
    <div id="analytics-content-m"></div>
  </div>
</div>

<!-- LOADING -->
<div id="loading-overlay">
  <p><em>Loading sessions&hellip;</em></p>
</div>

<script>
const API_BASE = 'https://myevh.netlify.app';

// ── STATE ──────────────────────────────────────────────────────────────────────
let sessions = [];
let currentFilter = 'all';
let currentTab = 'overview';
let excludeFree = true;
let odometer = parseInt(localStorage.getItem('ev-odo') || '1980');
let loadedCount = 5;
const SESSIONS_PER_PAGE = 5;
const BATTERY_KWH = 40;
const charts = {};

function isDesktop() { return window.innerWidth >= 900; }

function overviewEl() { return isDesktop() ? document.getElementById('overview-content') : document.getElementById('overview-content-m'); }
function sessionsEl() { return isDesktop() ? document.getElementById('sessions-list') : document.getElementById('sessions-list-m'); }
function analyticsEl() { return isDesktop() ? document.getElementById('analytics-content') : document.getElementById('analytics-content-m'); }


loadSessions();

// ── API ────────────────────────────────────────────────────────────────────────
async function loadSessions() {
  try {
    const [sessRes, odoRes] = await Promise.all([
      fetch(API_BASE + '/api/sessions'),
      fetch(API_BASE + '/api/odometer')
    ]);
    if (!sessRes.ok) throw new Error();
    sessions = await sessRes.json();
    migrateSessions(sessions);
    if (odoRes.ok) {
      const odoData = await odoRes.json();
      odometer = odoData.odometer;
      localStorage.setItem('ev-odo', odometer);
    }
  } catch {
    alert('Failed to load data - check connection');
    sessions = [];
  }
  hideLoading();
  renderAll();
}

// Migrate old "23 Jun 2026, 02:16 PM" date strings to {date:"2026-06-23", time:"14:16"}
function migrateSessions(arr) {
  const MONTHS = {Jan:1,Feb:2,Mar:3,Apr:4,May:5,Jun:6,Jul:7,Aug:8,Sep:9,Oct:10,Nov:11,Dec:12};
  arr.forEach(s => {
    if (s.date && s.date.includes(' ')) {
      const m = s.date.match(/(\d{1,2})\s+(\w{3})\s+(\d{4})(?:,\s*(\d{1,2}):(\d{2})\s*(AM|PM))?/i);
      if (m) {
        const dd = String(parseInt(m[1])).padStart(2,'0');
        const mm = String(MONTHS[m[2]] || 1).padStart(2,'0');
        const yyyy = m[3];
        s.date = `${yyyy}-${mm}-${dd}`;
        if (m[4]) {
          let h = parseInt(m[4]);
          const min = m[5];
          const ampm = m[6].toUpperCase();
          if (ampm === 'PM' && h !== 12) h += 12;
          if (ampm === 'AM' && h === 12) h = 0;
          s.time = `${String(h).padStart(2,'0')}:${min}`;
        } else {
          s.time = s.time || null;
        }
      }
    }
  });
}

// ── HELPERS ────────────────────────────────────────────────────────────────────
function effRate(s) { return s.energy > 0 ? s.cost / s.energy : 0; }

const MONTH_NAMES = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

function isoToDisplay(dateStr) {
  const [y, m, d] = dateStr.split('-');
  return `${parseInt(d)} ${MONTH_NAMES[parseInt(m)-1]} ${y}`;
}

function shortDate(dateStr) {
  const [, m, d] = dateStr.split('-');
  return `${parseInt(d)} ${MONTH_NAMES[parseInt(m)-1]}`;
}

function formatTime(timeStr) {
  if (!timeStr) return null;
  const [hh, mm] = timeStr.split(':');
  const h = parseInt(hh);
  const ampm = h >= 12 ? 'PM' : 'AM';
  const h12 = h % 12 || 12;
  return `${h12}:${mm} ${ampm}`;
}

function parseDate(dateStr) { return new Date(dateStr); }

function cmpDateTime(a, b, asc) {
  const d = parseDate(a.date) - parseDate(b.date);
  if (d !== 0) return asc ? d : -d;
  const at = a.time || '99:99';
  const bt = b.time || '99:99';
  return asc ? at.localeCompare(bt) : bt.localeCompare(at);
}

function sortedSessions() { return [...sessions].sort((a, b) => cmpDateTime(a, b, false)); }
function sortedSessionsAsc() { return [...sessions].sort((a, b) => cmpDateTime(a, b, true)); }

function dateRange() {
  if (!sessions.length) return '';
  const s = sortedSessionsAsc();
  const am = MONTH_NAMES[parseInt(s[0].date.split('-')[1])-1];
  const bm = MONTH_NAMES[parseInt(s[s.length-1].date.split('-')[1])-1];
  const yr = s[s.length-1].date.split('-')[0];
  return am === bm ? `${am} ${yr}` : `${am}&#8211;${bm} ${yr}`;
}

function fmt(n) { return n.toLocaleString('en-IN', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

// ── RENDER ─────────────────────────────────────────────────────────────────────
function renderAll() {
  loadedCount = SESSIONS_PER_PAGE;
  buildOverview();
  buildSessionCards(currentFilter);
  updateFilterCounts();
  if (currentTab === 'analytics' || isDesktop()) buildAnalyticsCharts();
}

// ── OVERVIEW ───────────────────────────────────────────────────────────────────
function buildOverview() {
  if (charts.running) { charts.running.destroy(); delete charts.running; }

  const sorted = sortedSessionsAsc();
  const freeSessions = sessions.filter(s => s.free);
  const paidSessions = excludeFree ? sessions.filter(s => !s.free) : sessions;
  const total = paidSessions.reduce((s, x) => s + x.cost, 0);
  const totalEnergy = sessions.reduce((s, x) => s + x.energy, 0);
  const fast = paidSessions.filter(s => s.type === 'fast');
  const slow = paidSessions.filter(s => s.type === 'slow');
  const fastCost = fast.reduce((s, x) => s + x.cost, 0);
  const slowCost = slow.reduce((s, x) => s + x.cost, 0);
  const fastEnergy = sessions.filter(s => s.type === 'fast').reduce((s, x) => s + x.energy, 0);
  const slowEnergy = sessions.filter(s => s.type === 'slow').reduce((s, x) => s + x.energy, 0);

  const netMap = {};
  paidSessions.forEach(s => {
    const n = s.network || 'Unknown';
    if (!netMap[n]) netMap[n] = { cost: 0, energy: 0 };
    netMap[n].cost += s.cost; netMap[n].energy += s.energy;
  });
  const netRates = Object.entries(netMap)
    .map(([n, v]) => ({ name: n, rate: v.energy > 0 ? v.cost / v.energy : 0 }))
    .sort((a, b) => a.rate - b.rate);
  const cheapest = netRates[0] || { name: '', rate: 0 };
  const dearest = netRates[netRates.length - 1] || { name: '', rate: 0 };

  const totalSocGain = sessions.reduce((s, x) => s + (x.endSoc - x.startSoc), 0);
  const cycles = totalSocGain / 100;
  const cyclesFrac = cycles % 1;
  const cyclePct = Math.round(cyclesFrac * 100);
  const kwhRemaining = ((1 - cyclesFrac) * BATTERY_KWH).toFixed(1);

  const fc = total > 0 ? (fastCost / total * 100).toFixed(1) : '0.0';
  const sc = total > 0 ? (slowCost / total * 100).toFixed(1) : '0.0';
  const fe = totalEnergy > 0 ? (fastEnergy / totalEnergy * 100).toFixed(1) : '0.0';
  const se = totalEnergy > 0 ? (slowEnergy / totalEnergy * 100).toFixed(1) : '0.0';
  const avgRate = totalEnergy > 0 ? (total / totalEnergy).toFixed(2) : '0.00';
  const estRange = Math.round(totalEnergy * 9.5);
  const dr = dateRange();

  document.getElementById('period-badge').innerHTML = dr;

  overviewEl().innerHTML = `
    ${freeSessions.length > 0 ? `
    <p>
      ${excludeFree ? `<small>${freeSessions.length} unpaid session${freeSessions.length !== 1 ? 's' : ''} excluded</small>` : ''}
      <button onclick="toggleFreeFilter()">
        ${excludeFree ? 'Show All' : 'Paid Only'}
      </button>
    </p>` : ''}

    <h3>Grand Total: &#8377;${fmt(total)}</h3>
    <p>${sessions.length} session${sessions.length !== 1 ? 's' : ''} &bull; ${dr}</p>

    <p><strong>Odometer:</strong> ${odometer.toLocaleString('en-IN')} km</p>

    <table border="1" cellpadding="6" cellspacing="0">
      <tr><th>Metric</th><th>Value</th></tr>
      <tr><td>Total Energy</td><td>${totalEnergy.toFixed(1)} kWh charged</td></tr>
      <tr><td>Sessions</td><td>${sessions.length} total charges</td></tr>
      <tr><td>Avg Cost/kWh</td><td>&#8377;${avgRate} blended rate</td></tr>
      <tr><td>Range Est.</td><td>~${estRange.toLocaleString('en-IN')} km (@ 9.5 km/kWh)</td></tr>
      <tr><td>Most Expensive</td><td>${dearest.name} &#8377;${dearest.rate.toFixed(2)}/kWh</td></tr>
      <tr><td>Cheapest</td><td>${cheapest.name} &#8377;${cheapest.rate.toFixed(2)}/kWh</td></tr>
    </table>

    <h3>Cost Split: Fast vs Slow Charging</h3>
    <p>&#9889; Fast: &#8377;${fastCost.toFixed(2)} (${fc}%) &nbsp;|&nbsp; &#127807; Slow: &#8377;${slowCost.toFixed(2)} (${sc}%)</p>
    <p>Energy split: &#9889; ${fastEnergy.toFixed(1)} kWh (${fe}%) &nbsp;|&nbsp; &#127807; ${slowEnergy.toFixed(1)} kWh (${se}%)</p>
    <p>&#9889; Fast sessions: <strong>${fast.length}</strong> &nbsp;|&nbsp; &#127807; Slow sessions: <strong>${slow.length}</strong></p>

    <h3>Battery Cycles: ${cycles.toFixed(2)} equivalent full cycles</h3>
    <p>Battery: ${BATTERY_KWH} kWh &bull; Progress toward next cycle: ${cyclePct}%</p>
    <p>${cyclesFrac.toFixed(2)} of next cycle &bull; ~${kwhRemaining} kWh to go</p>
    <p><small>1 cycle = 0&#8594;100% (${BATTERY_KWH} kWh). Rated ~1,000 cycles. Used <strong>${(cycles / 10).toFixed(2)}%</strong> of total battery life.</small></p>

    <h4>Partial cycles by session:</h4>
    <table border="1" cellpadding="4" cellspacing="0">
      <tr><th>Date</th><th>Type</th><th>Cycle fraction</th></tr>
      ${sorted.map(s => {
        const pct = ((s.endSoc - s.startSoc) / 100).toFixed(2);
        return `<tr>
          <td>${shortDate(s.date)}</td>
          <td>${s.type === 'fast' ? '&#9889; Fast' : '&#127807; Slow'}</td>
          <td>${pct}&times;</td>
        </tr>`;
      }).join('')}
    </table>

    <h3>Running Cost Over Time (&#8377;)</h3>
    <div style="width:100%;max-width:600px"><canvas id="runningCostChart" height="200"></canvas></div>
  `;

  if (!sorted.length) return;
  let running = 0;
  const runData = sorted.map(s => { running += s.cost; return running; });
  charts.running = new Chart(document.getElementById('runningCostChart'), {
    type: 'line',
    data: {
      labels: sorted.map(s => shortDate(s.date)),
      datasets: [{
        data: runData,
        borderColor: '#000', backgroundColor: 'rgba(0,0,0,0.05)',
        borderWidth: 2,
        pointRadius: 4,
        fill: true, tension: 0.35
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: { legend: { display: false } },
      scales: {
        y: { ticks: { callback: v => '&#8377;' + v.toLocaleString('en-IN') } }
      }
    }
  });
}

// ── SESSION CARDS ──────────────────────────────────────────────────────────────
function buildSessionCards(filter) {
  const list = sessionsEl();
  const sorted = sortedSessions();
  const visible = filter === 'all' ? sorted : sorted.filter(s => s.type === filter);

  if (!visible.length) {
    list.innerHTML = `<p>No sessions yet.</p>`;
    return;
  }

  const runByIdx = new Map();
  let runAcc = 0;
  sortedSessionsAsc().forEach(s => { runAcc += s.cost; runByIdx.set(s, runAcc); });

  const toShow = visible.slice(0, loadedCount);
  const hasMore = loadedCount < visible.length;

  function cardHtml(s) {
    const er = effRate(s);
    const pc = ((s.endSoc - s.startSoc) / 100).toFixed(2);
    const typeLabel = s.type === 'fast' ? '&#9889; Fast DC' : '&#127807; Slow AC';
    const runningTotal = runByIdx.get(s) || 0;
    return `<fieldset>
      <legend><strong>${s.displayName}</strong> &#8377;${s.cost.toFixed(2)}</legend>
      <p>
        ${s.chargerKw ? `${s.chargerKw} kW` : typeLabel}
        ${s.free ? ' | <strong>FREE</strong>' : ''}
        | ${isoToDisplay(s.date)}
        ${s.time ? ' | ' + formatTime(s.time) : ''}
      </p>
      <p>SOC: ${s.startSoc}% &#8594; ${s.endSoc}% (+${s.endSoc - s.startSoc}%)</p>
      <table border="1" cellpadding="4" cellspacing="0">
        <tr>
          <th>Energy</th><th>&#8377;/kWh</th><th>Cycle</th>
        </tr>
        <tr>
          <td>${s.energy} kWh</td>
          <td>&#8377;${er.toFixed(2)}</td>
          <td>${pc}&times;</td>
        </tr>
      </table>
      <p><small>Rate: ${s.rate || '-'} &nbsp;|&nbsp; Running total: &#8377;${runningTotal.toFixed(2)}</small></p>
    </fieldset>`;
  }

  list.innerHTML = toShow.map(cardHtml).join('') +
    `<p><small>Showing ${toShow.length} of ${visible.length}</small></p>` +
    (hasMore ? `<div id="scroll-sentinel" style="height:1px"></div>` : '');

  if (hasMore) {
    const sentinel = document.getElementById('scroll-sentinel');
    const obs = new IntersectionObserver(entries => {
      if (entries[0].isIntersecting) {
        obs.disconnect();
        loadedCount += SESSIONS_PER_PAGE;
        buildSessionCards(currentFilter);
      }
    }, { rootMargin: '200px' });
    obs.observe(sentinel);
  }
}

function updateFilterCounts() {
  const f = sessions.filter(s => s.type === 'fast').length;
  const sl = sessions.filter(s => s.type === 'slow').length;
  ['filter-all','filter-all-m'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = `All (${sessions.length})`; });
  ['filter-fast','filter-fast-m'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = `Fast (${f})`; });
  ['filter-slow','filter-slow-m'].forEach(id => { const el = document.getElementById(id); if (el) el.textContent = `Slow (${sl})`; });
}

// ── TABS ───────────────────────────────────────────────────────────────────────
function showTab(name) {
  currentTab = name;
  ['overview','sessions','analytics'].forEach(t => {
    const el = document.getElementById('tab-' + t);
    if (el) el.style.display = t === name ? '' : 'none';
  });
  if (name === 'analytics') buildAnalyticsCharts();
}

// ── FILTER ─────────────────────────────────────────────────────────────────────
function filterSessions(type, btn) {
  currentFilter = type;
  loadedCount = SESSIONS_PER_PAGE;
  buildSessionCards(type);
}

function toggleFreeFilter() {
  excludeFree = !excludeFree;
  buildOverview();
}

// ── ANALYTICS CHARTS ───────────────────────────────────────────────────────────
function buildAnalyticsCharts() {
  ['rate', 'energy', 'soc', 'donut'].forEach(k => {
    if (charts[k]) { charts[k].destroy(); delete charts[k]; }
  });

  const sorted = sortedSessionsAsc();
  if (!sorted.length) {
    analyticsEl().innerHTML = '<p>No data to display.</p>';
    return;
  }

  const netMap = {};
  sessions.forEach(s => {
    const n = s.network || 'Unknown';
    if (!netMap[n]) netMap[n] = { cost: 0, energy: 0, type: s.type };
    netMap[n].cost += s.cost; netMap[n].energy += s.energy;
  });
  const nets = Object.entries(netMap)
    .map(([n, v]) => ({ name: n, rate: v.energy > 0 ? v.cost / v.energy : 0, cost: v.cost, type: v.type }))
    .sort((a, b) => a.rate - b.rate);

  const fast = sessions.filter(s => s.type === 'fast');
  const slow = sessions.filter(s => s.type === 'slow');
  const fastCost = fast.reduce((s, x) => s + x.cost, 0);
  const slowCost = slow.reduce((s, x) => s + x.cost, 0);
  const fastE = fast.reduce((s, x) => s + x.energy, 0);
  const slowE = slow.reduce((s, x) => s + x.energy, 0);
  const fastRate = fastE > 0 ? fastCost / fastE : 0;
  const slowRate = slowE > 0 ? slowCost / slowE : 0;
  const ratio = slowRate > 0 ? (fastRate / slowRate).toFixed(1) : '-';
  const totalCost = fastCost + slowCost;

  analyticsEl().innerHTML = `
    <h3>Cost per kWh by Network (&#8377;/kWh eff.)</h3>
    <div style="max-width:600px"><canvas id="rateChart" height="200"></canvas></div>

    <h3>Energy Charged per Session (kWh)</h3>
    <div style="max-width:600px"><canvas id="energyChart" height="200"></canvas></div>

    <h3>SOC Increase per Session (%)</h3>
    <div style="max-width:600px"><canvas id="socChart" height="200"></canvas></div>

    <h3>Cost Breakdown by Network</h3>
    <div style="max-width:400px"><canvas id="donutChart" height="300"></canvas></div>

    <h3>Fast vs Slow: Head to Head</h3>
    <table border="1" cellpadding="6" cellspacing="0">
      <tr><th>Metric</th><th>&#9889; Fast</th><th>&#127807; Slow</th></tr>
      <tr><td>Sessions</td><td>${fast.length}</td><td>${slow.length}</td></tr>
      <tr><td>Total Cost</td><td>&#8377;${fastCost.toFixed(2)}</td><td>&#8377;${slowCost.toFixed(2)}</td></tr>
      <tr><td>Energy</td><td>${fastE.toFixed(1)} kWh</td><td>${slowE.toFixed(1)} kWh</td></tr>
      <tr><td>Avg &#8377;/kWh</td><td>&#8377;${fastRate.toFixed(2)}</td><td>&#8377;${slowRate.toFixed(2)}</td></tr>
      <tr><td>Cost Ratio</td><td colspan="2">Fast is ${ratio}&times; more expensive</td></tr>
    </table>
  `;

  charts.rate = new Chart(document.getElementById('rateChart'), {
    type: 'bar',
    data: { labels: nets.map(n => n.name), datasets: [{ data: nets.map(n => n.rate), backgroundColor: '#ccc', borderColor: '#000', borderWidth: 1 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { ticks: { callback: v => '₹' + v.toFixed(0) } } } }
  });

  charts.energy = new Chart(document.getElementById('energyChart'), {
    type: 'bar',
    data: { labels: sorted.map(s => shortDate(s.date)), datasets: [{ data: sorted.map(s => s.energy), backgroundColor: '#ccc', borderColor: '#000', borderWidth: 1 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ctx.raw + ' kWh' } } }, scales: { x: { ticks: { maxRotation: 45 } }, y: { ticks: { callback: v => v + ' kWh' } } } }
  });

  charts.soc = new Chart(document.getElementById('socChart'), {
    type: 'bar',
    data: { labels: sorted.map(s => shortDate(s.date)), datasets: [{ data: sorted.map(s => s.endSoc - s.startSoc), backgroundColor: '#ccc', borderColor: '#000', borderWidth: 1 }] },
    options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => '+' + ctx.raw + '%' } } }, scales: { x: { ticks: { maxRotation: 45 } }, y: { ticks: { callback: v => v + '%' } } } }
  });

  charts.donut = new Chart(document.getElementById('donutChart'), {
    type: 'doughnut',
    data: { labels: nets.map(n => n.name), datasets: [{ data: nets.map(n => n.cost), borderWidth: 1 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '60%', plugins: { legend: { position: 'bottom' }, tooltip: { callbacks: { label: ctx => `&#8377;${ctx.raw.toFixed(2)} (${totalCost > 0 ? ((ctx.raw / totalCost) * 100).toFixed(1) : 0}%)` } } } }
  });
}

// ── LOADING ────────────────────────────────────────────────────────────────────
function hideLoading() {
  document.getElementById('loading-overlay').style.display = 'none';
}
</script>
</body>
</html>
